version: "3.8"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dblentry
      POSTGRES_PASSWORD: dblentry
      POSTGRES_DB: dblentry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dblentry -d dblentry"]
      interval: 2s
      timeout: 5s
      retries: 10
